<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fafb;
            padding: 20px;
        }

        .container {
            background-color: white;
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .header {
            text-align: center;
            color: #DC2626;
            margin-bottom: 20px;
        }

        .icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #6B7280;
            text-align: center;
        }

        p {
            color: #374151;
            line-height: 1.6;
        }

        .info-box {
            background-color: #EFF6FF;
            border: 1px solid #BFDBFE;
            border-radius: 6px;
            padding: 12px;
            margin-top: 15px;
            color: #1E40AF;
            font-size: 14px;
        }
    </style>
</head>

<body dir="rtl">
    <div class="container">
        <div class="icon">🗑️</div>
        <h2 class="header">تم جدولة حذف حسابك</h2>
        <p>مرحباً {{ name }}،</p>
        <p>لقد قمت بطلب حذف حسابك. سيتم حذف حسابك نهائياً بعد <strong>30 يوماً</strong> من الآن.</p>
        <div class="info-box">
            💡 إذا غيرت رأيك، يمكنك ببساطة تسجيل الدخول مرة أخرى خلال الـ 30 يوماً القادمة وسيتم إلغاء عملية الحذف
            تلقائياً.
        </div>
        <div class="footer">
            <p>عيادتك الرقمية - My Digital Clinic</p>
        </div>
    </div>
</body>

</html>

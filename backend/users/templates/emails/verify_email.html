<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9fafb; padding: 20px; }
        .container { background-color: white; border-radius: 8px; padding: 30px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { text-align: center; color: #4F46E5; margin-bottom: 20px; }
        .button { display: inline-block; padding: 12px 24px; background-color: #4F46E5; color: white !important; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 20px; }
        .footer { margin-top: 30px; font-size: 12px; color: #6B7280; text-align: center; }
        p { color: #374151; line-height: 1.6; }
    </style>
</head>
<body dir="rtl">
    <div class="container">
        <h2 class="header">مرحباً بك في عيادتك الرقمية</h2>
        <p>مرحباً {{ name }}،</p>
        <p>شكراً لتسجيلك معنا! يرجى تأكيد بريدك الإلكتروني عن طريق النقر على الزر أدناه للبدء في استخدام حسابك.</p>
        <div style="text-align: center;">
            <a href="{{ verification_url }}" class="button">تأكيد البريد الإلكتروني</a>
        </div>
        <p style="margin-top: 20px;">أو يمكنك نسخ الرابط التالي ولصقه في متصفحك:</p>
        <p dir="ltr" style="word-break: break-all; font-size: 14px; color: #4F46E5;">{{ verification_url }}</p>
        <div class="footer">
            <p>إذا لم تكن قد طلبت إنشاء حساب، يرجى تجاهل هذه الرسالة.</p>
        </div>
    </div>
</body>
</html>
